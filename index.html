<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mick Verzola</title>
    <!-- Social Sharing Metadata -->
    <meta property="og:title" content="Mick Verzola">
    <meta property="og:description" content="Personal website of Mick Verzola.">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grid-container animate-fade-in">
        
        <!-- Header Grid Area -->
        <header class="grid-item border-bottom">
            <div class="logo">MV</div>
            <nav class="links">
                <a href="#" id="link-instagram" target="_blank">Instagram</a>
                <a href="#" id="link-facebook" target="_blank">Facebook</a>
                <a href="mockups.html" class="highlight-link">Web Mockups</a>
            </nav>
        </header>

        <!-- Main Headline Area -->
        <main class="grid-item border-bottom hero-section">
            <h1 id="headline" class="animate-slide-up">Loading...</h1>
        </main>

        <!-- Dynamic Images Area -->
        <section class="grid-item border-bottom images-section">
            <div class="image-wrapper animate-slide-up delay-1">
                <div class="img-container">
                    <img id="dynamic-image-1" src="" alt="Dynamic Image 1">
                </div>
                <p class="caption" id="caption-1">Loading...</p>
            </div>
            
            <!-- Vertical Divider for Desktop -->
            <div class="vertical-divider"></div>
            
            <div class="image-wrapper animate-slide-up delay-2">
                <div class="img-container">
                    <img id="dynamic-image-2" src="" alt="Dynamic Image 2">
                </div>
                <p class="caption" id="caption-2">Loading...</p>
            </div>
        </section>

        <!-- Bio Content Area -->
        <section class="grid-item border-bottom bio-section animate-slide-up delay-3">
            <div class="bio-title-container">
                <h2 id="bio-title">Loading...</h2>
                <p class="subtitle" id="bio-subtitle">Loading...</p>
            </div>
            <div class="bio-text-container">
                <p id="bio-text">Loading...</p>
            </div>
        </section>

        <!-- Footer Area -->
        <footer class="grid-item footer">
            <p id="footer-text">Loading...</p>
        </footer>

    </div>
    <script src="script.js"></script>
</body>
</html>
